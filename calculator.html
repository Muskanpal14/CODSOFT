<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .calc-container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 100%;
      padding: 32px;
    }
    .calc-title {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 24px;
      text-align: center;
    }
    .calc-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      border-bottom: 1px solid #e5e5e5;
    }
    .calc-row:first-of-type {
      border-top: 1px solid #e5e5e5;
    }
    .calc-label {
      width: 120px;
      font-size: 14px;
      color: #666;
      flex-shrink: 0;
      font-weight: 500;
    }
    .calc-input-wrap {
      flex: 1;
    }
    .calc-input-wrap input,
    .calc-input-wrap select {
      width: 100%;
      padding: 10px 14px;
      font-size: 16px;
      border: 1px solid #d1d1d6;
      border-radius: 10px;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .calc-input-wrap input:focus,
    .calc-input-wrap select:focus {
      border-color: #1a1a1a;
    }
    .calc-btn-row {
      padding: 20px 0;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      justify-content: flex-end;
    }
    .calc-btn {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #1a1a1a;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .calc-btn:hover { opacity: 0.85; }
    .calc-btn:active { opacity: 0.7; }
    .calc-result-row {
      padding: 20px 0;
      border-bottom: 1px solid #e5e5e5;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .calc-result-label {
      width: 120px;
      font-size: 14px;
      color: #666;
      flex-shrink: 0;
      font-weight: 500;
    }
    .calc-result-value {
      flex: 1;
      font-size: 32px;
      font-weight: 600;
      color: #1a1a1a;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .calc-error-row {
      padding: 10px 0;
      min-height: 36px;
    }
    .calc-error {
      color: #e53935;
      font-size: 14px;
      text-align: right;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; }
      .calc-container { background: #2c2c2e; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
      .calc-title { color: #f5f5f7; }
      .calc-row { border-color: #3a3a3c; }
      .calc-row:first-of-type { border-color: #3a3a3c; }
      .calc-label { color: #a1a1a6; }
      .calc-input-wrap input,
      .calc-input-wrap select { background: #1c1c1e; border-color: #3a3a3c; color: #f5f5f7; }
      .calc-input-wrap input:focus,
      .calc-input-wrap select:focus { border-color: #f5f5f7; }
      .calc-btn-row { border-color: #3a3a3c; }
      .calc-btn { background: #f5f5f7; color: #1a1a1a; }
      .calc-result-row { border-color: #3a3a3c; }
      .calc-result-label { color: #a1a1a6; }
      .calc-result-value { color: #f5f5f7; }
    }
  </style>
</head>
<body>
  <div class="calc-container">
    <div class="calc-title">Simple Calculator</div>

    <div class="calc-row">
      <div class="calc-label">First number</div>
      <div class="calc-input-wrap">
        <input type="number" id="num1" placeholder="Enter a number" step="any">
      </div>
    </div>

    <div class="calc-row">
      <div class="calc-label">Operation</div>
      <div class="calc-input-wrap">
        <select id="op">
          <option value="+">+  Addition</option>
          <option value="-">−  Subtraction</option>
          <option value="*">×  Multiplication</option>
          <option value="/">÷  Division</option>
        </select>
      </div>
    </div>

    <div class="calc-row">
      <div class="calc-label">Second number</div>
      <div class="calc-input-wrap">
        <input type="number" id="num2" placeholder="Enter a number" step="any">
      </div>
    </div>

    <div class="calc-btn-row">
      <button class="calc-btn" id="calcBtn">Calculate</button>
    </div>

    <div class="calc-result-row">
      <div class="calc-result-label">Result</div>
      <div class="calc-result-value" id="resultValue">—</div>
    </div>

    <div class="calc-error-row">
      <div class="calc-error" id="errorMsg"></div>
    </div>
  </div>

  <script>
    (function() {
      const num1 = document.getElementById('num1');
      const num2 = document.getElementById('num2');
      const op = document.getElementById('op');
      const btn = document.getElementById('calcBtn');
      const resultValue = document.getElementById('resultValue');
      const errorMsg = document.getElementById('errorMsg');

      function calculate() {
        errorMsg.textContent = '';
        const a = parseFloat(num1.value);
        const b = parseFloat(num2.value);
        const operation = op.value;

        if (isNaN(a) || isNaN(b)) {
          errorMsg.textContent = 'Please enter valid numbers in both fields.';
          resultValue.textContent = '—';
          return;
        }

        let result;
        switch (operation) {
          case '+': result = a + b; break;
          case '-': result = a - b; break;
          case '*': result = a * b; break;
          case '/':
            if (b === 0) {
              errorMsg.textContent = 'Cannot divide by zero.';
              resultValue.textContent = '—';
              return;
            }
            result = a / b;
            break;
        }

        const formatted = Number.isInteger(result)
          ? result.toString()
          : parseFloat(result.toFixed(8)).toString();
        resultValue.textContent = formatted;
      }

      btn.addEventListener('click', calculate);
      num1.addEventListener('keydown', function(e) { if (e.key === 'Enter') calculate(); });
      num2.addEventListener('keydown', function(e) { if (e.key === 'Enter') calculate(); });
    })();
  </script>
</body>
</html>
