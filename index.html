<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Book - Modern Contact Management</title>
  <meta name="description" content="Manage your personal and professional contacts easily with interactive search, update, delete, and persistent storage features.">
  <link rel="stylesheet" href="styles.css">
  <!-- FontAwesome Icons for clean UI elements -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="app-container">
    <!-- Header Section -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-icon">
          <i class="fa-solid fa-address-book"></i>
        </div>
        <div class="brand-title">
          <h1>Contact Book</h1>
          <p>Organize, search, and manage your contacts effortlessly</p>
        </div>
      </div>

      <div class="header-actions">
        <div class="stats-badge">
          <i class="fa-solid fa-users"></i>
          Total: <span id="totalCount" class="count">0</span>
        </div>
        <div class="stats-badge">
          <i class="fa-solid fa-star" style="color: var(--warning);"></i>
          Favorites: <span id="favCount" class="count">0</span>
        </div>
        <button id="themeToggleBtn" class="btn-icon" title="Toggle Light/Dark Theme" aria-label="Toggle Theme">
          <i class="fa-solid fa-sun" id="themeIcon"></i>
        </button>
      </div>
    </header>

    <!-- Main Control Bar -->
    <section class="control-bar">
      <div class="search-section">
        <div class="search-wrapper">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search contact by name or phone number..." autocomplete="off">
          <button id="clearSearchBtn" class="clear-search-btn" title="Clear Search">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        
        <button id="openAddModalBtn" class="btn-primary">
          <i class="fa-solid fa-user-plus"></i> Add New Contact
        </button>

        <button id="exportBtn" class="btn-secondary" title="Export contacts to JSON">
          <i class="fa-solid fa-download"></i> Export
        </button>

        <label for="importFileInput" class="btn-secondary" style="cursor: pointer;" title="Import contacts from JSON">
          <i class="fa-solid fa-upload"></i> Import
          <input type="file" id="importFileInput" accept=".json" style="display: none;">
        </label>
      </div>

      <!-- Filters, Sort, and View Switching -->
      <div class="filter-bar">
        <div class="category-pills">
          <button class="pill-btn active" data-category="all">All Contacts</button>
          <button class="pill-btn" data-category="favorites"><i class="fa-solid fa-star"></i> Favorites</button>
          <button class="pill-btn" data-category="Personal">Personal</button>
          <button class="pill-btn" data-category="Work">Work</button>
          <button class="pill-btn" data-category="Family">Family</button>
        </div>

        <div class="view-options">
          <select id="sortSelect" class="sort-select" title="Sort contacts">
            <option value="name-asc">Sort: Name (A-Z)</option>
            <option value="name-desc">Sort: Name (Z-A)</option>
            <option value="newest">Sort: Recently Added</option>
          </select>

          <div class="view-toggle-group">
            <button id="gridViewBtn" class="view-toggle-btn active" title="Grid View">
              <i class="fa-solid fa-grip"></i>
            </button>
            <button id="listViewBtn" class="view-toggle-btn" title="List View">
              <i class="fa-solid fa-list"></i>
            </button>
          </div>
        </div>
      </div>
    </section>

    <!-- Contacts List / Grid View Container -->
    <main>
      <div id="contactsContainer" class="contacts-grid">
        <!-- Contact cards will be dynamically injected here -->
      </div>
    </main>
  </div>

  <!-- Add / Edit Contact Modal -->
  <div id="contactModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-container">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title">Add Contact</h2>
        <button id="closeModalBtn" class="btn-close-modal" aria-label="Close modal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <form id="contactForm">
        <div class="modal-body">
          <input type="hidden" id="contactId">
          <div class="form-grid">
            <div class="form-group">
              <label for="contactName" class="form-label">Full Name <span class="required">*</span></label>
              <input type="text" id="contactName" class="input-control" placeholder="e.g. Sarah Jenkins" required>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="contactPhone" class="form-label">Phone Number <span class="required">*</span></label>
                <input type="tel" id="contactPhone" class="input-control" placeholder="e.g. +1 555-0199" required>
              </div>

              <div class="form-group">
                <label for="contactCategory" class="form-label">Category</label>
                <select id="contactCategory" class="input-control">
                  <option value="Personal">Personal</option>
                  <option value="Work">Work</option>
                  <option value="Family">Family</option>
                  <option value="Other">Other</option>
                </select>
              </div>
            </div>

            <div class="form-group">
              <label for="contactEmail" class="form-label">Email Address</label>
              <input type="email" id="contactEmail" class="input-control" placeholder="e.g. sarah.j@example.com">
            </div>

            <div class="form-group">
              <label for="contactAddress" class="form-label">Physical Address</label>
              <textarea id="contactAddress" class="input-control" placeholder="e.g. 742 Evergreen Terrace, Springfield"></textarea>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
          <button type="submit" id="saveContactBtn" class="btn-primary">
            <i class="fa-solid fa-floppy-disk"></i> Save Contact
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-container" style="max-width: 420px;">
      <div class="modal-header">
        <h2 class="modal-title">Delete Contact</h2>
        <button id="closeDeleteModalBtn" class="btn-close-modal" aria-label="Close modal">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      
      <div class="modal-body">
        <div class="delete-dialog-content">
          <div class="delete-icon">
            <i class="fa-solid fa-trash-can"></i>
          </div>
          <p id="deleteConfirmText">Are you sure you want to delete this contact? This action cannot be undone.</p>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" id="cancelDeleteBtn" class="btn-secondary">Cancel</button>
        <button type="button" id="confirmDeleteBtn" class="btn-danger">
          <i class="fa-solid fa-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>
</html>
