<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Password Generator</title>
    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>Password Generator</h1>
            <p>Create strong, secure passwords instantly</p>
        </header>

        <!-- Main Card -->
        <div class="card">
            <!-- Password Display Box -->
            <div class="password-box">
                <input type="text" id="password-display" readonly value="" placeholder="Your password will appear here">
                <div class="actions">
                    <button id="btn-copy" class="btn-action" title="Copy to clipboard">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                        <span>Copy</span>
                    </button>
                    <button id="btn-regenerate" class="btn-action btn-icon-only" title="Generate New Password">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
                    </button>
                </div>
            </div>

            <!-- Strength Indicator -->
            <div class="strength-container">
                <div class="strength-header">
                    <span>Password Strength</span>
                    <span id="strength-text" class="strength-label">Strong</span>
                </div>
                <div class="strength-meter">
                    <div id="meter-bar-1" class="meter-bar"></div>
                    <div id="meter-bar-2" class="meter-bar"></div>
                    <div id="meter-bar-3" class="meter-bar"></div>
                    <div id="meter-bar-4" class="meter-bar"></div>
                </div>
            </div>

            <hr class="divider">

            <!-- Controls Section -->
            <div class="controls">
                <!-- Length Slider -->
                <div class="control-group">
                    <div class="label-row">
                        <label for="length-slider">Password Length</label>
                        <span id="length-val" class="length-val">16</span>
                    </div>
                    <input type="range" id="length-slider" min="6" max="64" value="16" class="slider">
                </div>

                <!-- Checkboxes Grid -->
                <div class="options-grid">
                    <label class="option-checkbox">
                        <input type="checkbox" id="chk-uppercase" checked>
                        <span class="custom-chk"></span>
                        <span>Uppercase Letters (A-Z)</span>
                    </label>

                    <label class="option-checkbox">
                        <input type="checkbox" id="chk-lowercase" checked>
                        <span class="custom-chk"></span>
                        <span>Lowercase Letters (a-z)</span>
                    </label>

                    <label class="option-checkbox">
                        <input type="checkbox" id="chk-digits" checked>
                        <span class="custom-chk"></span>
                        <span>Numbers (0-9)</span>
                    </label>

                    <label class="option-checkbox">
                        <input type="checkbox" id="chk-symbols" checked>
                        <span class="custom-chk"></span>
                        <span>Symbols (!@#$%)</span>
                    </label>
                </div>
            </div>

            <!-- Main Action Button -->
            <button id="btn-generate-main" class="btn-generate">Generate Password</button>
        </div>

        <!-- Optional Accordion / Extra Tools (Clean & Collapsible) -->
        <details class="extra-tools">
            <summary>More Options & Tools</summary>
            
            <div class="extra-content">
                <h3>Bulk Password Generator</h3>
                <div class="bulk-row">
                    <select id="bulk-count" class="select-input">
                        <option value="5">5 Passwords</option>
                        <option value="10" selected>10 Passwords</option>
                        <option value="20">20 Passwords</option>
                    </select>
                    <button id="btn-generate-bulk" class="btn-small">Generate Batch</button>
                    <button id="btn-export-txt" class="btn-small btn-outline">Export TXT</button>
                </div>
                <div id="bulk-results" class="bulk-results"></div>
            </div>
        </details>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">Password copied to clipboard!</div>

    <script src="app.js"></script>
</body>
</html>
