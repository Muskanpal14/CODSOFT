data:text/html,<!DOCTYPE html><html><head><meta charset="UTF-8"><title>To-Do List</title><style>body{font-family:'Inter',system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;margin:0;display:flex;align-items:center;justify-content:center;padding:20px;}#app{max-width:480px;width:100%;background:white;border-radius:20px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,0.3);}.header{text-align:center;margin-bottom:28px;}.header h1{font-size:28px;font-weight:700;margin:0 0 6px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}.header p{color:#888;font-size:14px;margin:0;}.stats{display:flex;justify-content:space-between;gap:12px;margin-bottom:20px;}.stat-card{flex:1;background:#f8f9fc;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid #e8e8f0;}.stat-card .number{font-size:22px;font-weight:700;color:#667eea;}.stat-card .label{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px;}.input-area{display:flex;gap:10px;margin-bottom:20px;}.task-input{flex:1;padding:14px 18px;border:2px solid #e8e8f0;border-radius:12px;font-size:15px;outline:none;font-family:inherit;}.task-input:focus{border-color:#667eea;box-shadow:0 0 0 4px rgba(102,126,234,0.1);}.add-btn{padding:14px 22px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;}.filters{display:flex;gap:8px;margin-bottom:16px;justify-content:center;}.filter-btn{padding:8px 16px;border:1px solid #e8e8f0;background:white;border-radius:20px;font-size:13px;cursor:pointer;color:#666;font-weight:500;}.filter-btn.active{background:#667eea;color:white;border-color:#667eea;}.task-list{list-style:none;padding:0;margin:0;}.task-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:white;border:1px solid #f0f0f5;border-radius:12px;margin-bottom:10px;animation:slideIn 0.3s ease-out;}@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}.task-item.completed .task-text{text-decoration:line-through;color:#aaa;}.task-item.completed .check-circle{background:#667eea;border-color:#667eea;}.task-item.completed .check-circle svg{opacity:1;}.check-circle{width:22px;height:22px;border:2px solid #d0d0e0;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}.check-circle svg{width:12px;height:12px;opacity:0;}.task-text{flex:1;font-size:15px;color:#333;cursor:text;padding:4px 8px;border-radius:6px;border:1px solid transparent;outline:none;}.task-text:focus{background:white;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.1);}.task-date{font-size:11px;color:#bbb;white-space:nowrap;}.delete-btn{width:28px;height:28px;border:none;background:transparent;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#ccc;}.delete-btn:hover{background:#fee;color:#e74c3c;}.empty-state{text-align:center;padding:40px 20px;color:#bbb;}.clear-completed{text-align:center;margin-top:16px;}.clear-completed button{padding:8px 20px;border:1px solid #e8e8f0;background:white;border-radius:20px;font-size:13px;color:#888;cursor:pointer;}.clear-completed button:hover{color:#e74c3c;border-color:#e74c3c;background:#fee;}.priority-selector{display:flex;gap:6px;margin-left:4px;}.priority-option{width:10px;height:10px;border-radius:50%;cursor:pointer;opacity:0.3;}.priority-option:hover,.priority-option.active{opacity:1;transform:scale(1.3);}.priority-high{background:#e74c3c;}.priority-medium{background:#f39c12;}.priority-low{background:#2ecc71;}</style></head><body><div id="app"><div class="header"><h1>✅ My Tasks</h1><p>Stay organized, get things done</p></div><div class="stats"><div class="stat-card"><div class="number" id="stat-total">0</div><div class="label">Total</div></div><div class="stat-card"><div class="number" id="stat-active">0</div><div class="label">Active</div></div><div class="stat-card"><div class="number" id="stat-completed">0</div><div class="label">Done</div></div></div><div class="input-area"><input type="text" class="task-input" id="taskInput" placeholder="What needs to be done?" maxlength="100"><button class="add-btn" onclick="addTask()">Add</button></div><div class="filters"><button class="filter-btn active" onclick="setFilter('all')">All</button><button class="filter-btn" onclick="setFilter('active')">Active</button><button class="filter-btn" onclick="setFilter('completed')">Completed</button></div><ul class="task-list" id="taskList"></ul><div class="empty-state" id="emptyState" style="display:none;"><p>No tasks yet. Add one above!</p></div><div class="clear-completed" id="clearCompleted" style="display:none;"><button onclick="clearCompleted()">Clear completed</button></div></div><script>let tasks=[],currentFilter='all',nextId=1;try{const saved=localStorage.getItem('todo_tasks');if(saved){tasks=JSON.parse(saved);nextId=tasks.length>0?Math.max(...tasks.map(t=>t.id))+1:1;}}catch(e){}function saveTasks(){try{localStorage.setItem('todo_tasks',JSON.stringify(tasks));}catch(e){}updateStats();render();}function updateStats(){document.getElementById('stat-total').textContent=tasks.length;document.getElementById('stat-active').textContent=tasks.filter(t=>!t.completed).length;document.getElementById('stat-completed').textContent=tasks.filter(t=>t.completed).length;}function addTask(){const input=document.getElementById('taskInput');const text=input.value.trim();if(!text)return;tasks.unshift({id:nextId++,text:text,completed:false,priority:'medium',createdAt:new Date().toISOString()});input.value='';saveTasks();}function toggleTask(id){const task=tasks.find(t=>t.id===id);if(task){task.completed=!task.completed;saveTasks();}}function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();}function updateTaskText(id,newText){const task=tasks.find(t=>t.id===id);if(task){task.text=newText.trim()||task.text;saveTasks();}}function setPriority(id,priority){const task=tasks.find(t=>t.id===id);if(task){task.priority=priority;saveTasks();}}function clearCompleted(){tasks=tasks.filter(t=>!t.completed);saveTasks();}function setFilter(filter){currentFilter=filter;document.querySelectorAll('.filter-btn').forEach(btn=>btn.classList.remove('active'));event.target.classList.add('active');render();}function formatDate(iso){const d=new Date(iso);const now=new Date();const diff=now-d;if(diff<60000)return'Just now';if(diff<3600000)return Math.floor(diff/60000)+'m ago';if(diff<86400000)return Math.floor(diff/3600000)+'h ago';return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}function render(){const list=document.getElementById('taskList');const empty=document.getElementById('emptyState');const clearBtn=document.getElementById('clearCompleted');let filtered=tasks;if(currentFilter==='active')filtered=tasks.filter(t=>!t.completed);if(currentFilter==='completed')filtered=tasks.filter(t=>t.completed);if(filtered.length===0){list.innerHTML='';empty.style.display='block';clearBtn.style.display='none';return;}empty.style.display='none';clearBtn.style.display=tasks.some(t=>t.completed)?'block':'none';list.innerHTML=filtered.map(task=>`<li class="task-item ${task.completed?'completed':''}"><div class="check-circle" onclick="toggleTask(${task.id})"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="priority-selector"><div class="priority-option priority-high ${task.priority==='high'?'active':''}" onclick="setPriority(${task.id},'high')"></div><div class="priority-option priority-medium ${task.priority==='medium'?'active':''}" onclick="setPriority(${task.id},'medium')"></div><div class="priority-option priority-low ${task.priority==='low'?'active':''}" onclick="setPriority(${task.id},'low')"></div></div><div class="task-text" contenteditable="true" onblur="updateTaskText(${task.id},this.innerText)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}">${task.text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div><div class="task-date">${formatDate(task.createdAt)}</div><button class="delete-btn" onclick="deleteTask(${task.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button></li>`).join('');}document.getElementById('taskInput').addEventListener('keypress',function(e){if(e.key==='Enter')addTask();});updateStats();render();</script></body></html>
